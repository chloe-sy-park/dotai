name: 💡 Idea
description: Propose an idea for the project, the catalog, or the community
title: "[idea] "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Anyone can propose an idea — for new features, new categories, new processes, anything.
        Others vote with 👍 ❤️ 🚀 reactions. If someone wants to implement it, they self-assign.

        아이디어는 누구나 환영합니다 — 새 기능, 새 카테고리, 새 프로세스 뭐든.
        다른 사람들은 reaction(👍 ❤️ 🚀)으로 투표. 구현하고 싶은 사람이 self-assign 합니다.

  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What do you want to see?
      placeholder: I think it would be cool if...
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does it solve, or what value does it add?
    validations:
      required: false

  - type: textarea
    id: how
    attributes:
      label: Implementation hints (optional)
      description: If you have thoughts on how this could be built, share them
    validations:
      required: false

  - type: checkboxes
    id: claim
    attributes:
      label: Are you up for implementing this?
      options:
        - label: I'd like to try implementing it myself
        - label: I'm just proposing — happy for someone else to take it
