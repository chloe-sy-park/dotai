name: Build Registry

on:
  push:
    branches: [main]
    paths:
      - "commands/**"
      - "mcp-servers/**"
      - "scripts/build-registry.mjs"
  pull_request:
    paths:
      - "commands/**"
      - "mcp-servers/**"
      - "scripts/build-registry.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-save gray-matter @iarna/toml

      - name: Build registry
        run: node scripts/build-registry.mjs

      - name: Commit REGISTRY.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet REGISTRY.json; then
            echo "No registry changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add REGISTRY.json
            git commit -m "chore: rebuild REGISTRY.json [skip ci]"
            git push
          fi
